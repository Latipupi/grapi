version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  postgres-db:
    image: postgres:15-alpine
    container_name: grapi-postgres
    restart: always
    environment:
      POSTGRES_DB: apotekdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root_production_password # Ganti dengan password yang lebih kuat untuk keamanan produksi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apotekdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Main Application Service (Spring Boot + React)
  grapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grapi-app-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      # Override environment variables Spring Boot dari application.yml
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/apotekdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root_production_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      # Anda bisa menambahkan JWT Secret key kustom di sini jika diperlukan
      # JWT_SECRET: your_secure_jwt_secret_key_here

volumes:
  postgres-data:
    driver: local
